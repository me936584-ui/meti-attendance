<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>METI Attendance</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #0a0e1a;
      --surface:   #111827;
      --border:    #1e2d45;
      --accent:    #0ea5e9;
      --accent2:   #38bdf8;
      --success:   #22c55e;
      --error:     #ef4444;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --mono:      'IBM Plex Mono', monospace;
      --sans:      'IBM Plex Sans', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(14,165,233,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(14,165,233,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(14,165,233,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .header {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(14,165,233,0.1);
      border: 1px solid rgba(14,165,233,0.25);
      border-radius: 999px;
      padding: 6px 16px;
      margin-bottom: 16px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--accent2);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .logo-badge::before {
      content: '';
      width: 6px; height: 6px;
      background: var(--success);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--success);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }

    h1 span { color: var(--accent); }

    .subtitle {
      font-size: 13px;
      color: var(--muted);
      font-family: var(--mono);
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 12px;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(14,165,233,0.4), transparent);
    }

    .field { margin-bottom: 20px; }
    .field:last-child { margin-bottom: 0; }

    label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    label .dot {
      width: 4px; height: 4px;
      background: var(--accent);
      border-radius: 50%;
    }

    .shift-group {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .shift-btn {
      padding: 10px 6px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }

    .shift-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(14,165,233,0.06);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .shift-btn:hover { border-color: rgba(14,165,233,0.4); color: var(--accent2); }
    .shift-btn:hover::after { opacity: 1; }

    .shift-btn.active {
      background: rgba(14,165,233,0.12);
      border-color: var(--accent);
      color: var(--accent2);
      box-shadow: 0 0 16px rgba(14,165,233,0.15), inset 0 0 16px rgba(14,165,233,0.05);
    }

    /* Two-col layout for the two inputs */
    .input-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .input-wrap { position: relative; }

    input[type="text"] {
      width: 100%;
      padding: 12px 14px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: var(--mono);
      font-size: 14px;
      color: var(--text);
      transition: all 0.2s;
      outline: none;
    }

    input[type="text"]:focus {
      border-color: var(--accent);
      background: rgba(14,165,233,0.04);
      box-shadow: 0 0 0 3px rgba(14,165,233,0.08);
    }

    input[type="text"]::placeholder {
      color: var(--muted);
      opacity: 0.5;
    }

    .hint {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      margin-top: 8px;
      opacity: 0.7;
    }

    /* Safety badge shown under inputs */
    .safety-note {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 14px;
      padding: 10px 14px;
      background: rgba(14,165,233,0.05);
      border: 1px solid rgba(14,165,233,0.12);
      border-radius: 8px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.5px;
      line-height: 1.5;
    }

    .safety-note::before {
      content: '⚙';
      font-size: 12px;
      color: var(--accent);
      flex-shrink: 0;
    }

    #submitBtn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #0369a1, #0ea5e9);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }

    #submitBtn::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
      transition: left 0.4s;
    }

    #submitBtn:hover:not(:disabled)::before { left: 100%; }
    #submitBtn:hover:not(:disabled) { box-shadow: 0 4px 20px rgba(14,165,233,0.35); transform: translateY(-1px); }
    #submitBtn:active:not(:disabled) { transform: translateY(0); }
    #submitBtn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .spinner {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
    }

    .spin-dots { display: flex; gap: 4px; }

    .spin-dots span {
      width: 5px; height: 5px;
      background: var(--accent);
      border-radius: 50%;
      animation: bounce 1s ease-in-out infinite;
    }

    .spin-dots span:nth-child(2) { animation-delay: 0.15s; }
    .spin-dots span:nth-child(3) { animation-delay: 0.3s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    .result-card {
      display: none;
      border-radius: 12px;
      padding: 20px;
      animation: fadeUp 0.3s ease both;
    }

    .result-card.success {
      background: rgba(34,197,94,0.06);
      border: 1px solid rgba(34,197,94,0.2);
    }

    .result-card.error {
      background: rgba(239,68,68,0.06);
      border: 1px solid rgba(239,68,68,0.2);
    }

    .result-title {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .result-card.success .result-title { color: var(--success); }
    .result-card.error   .result-title { color: var(--error); }

    .result-grid {
      display: grid;
      gap: 1px;
      background: rgba(255,255,255,0.04);
      border-radius: 6px;
      overflow: hidden;
    }

    .result-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      background: var(--surface);
    }

    .rk { font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
    .rv { font-family: var(--mono); font-size: 12px; color: var(--text); text-align: right; }

    .badge-p {
      background: rgba(34,197,94,0.15);
      color: var(--success);
      border: 1px solid rgba(34,197,94,0.3);
      font-family: var(--mono);
      font-weight: 700;
      font-size: 13px;
      padding: 2px 12px;
      border-radius: 4px;
      letter-spacing: 2px;
    }

    .error-msg {
      font-family: var(--mono);
      font-size: 12px;
      color: #fca5a5;
      line-height: 1.6;
    }

    .footer {
      text-align: center;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      opacity: 0.5;
      margin-top: 16px;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

<div class="wrapper">

  <div class="header">
    <div class="logo-badge">METI · SYSTEM ONLINE</div>
    <h1>Attend<span>ance</span></h1>
    <p class="subtitle">automated check-in terminal</p>
  </div>

  <div class="card">

    <!-- Shift -->
    <div class="field">
      <label><span class="dot"></span> Shift</label>
      <div class="shift-group">
        <button class="shift-btn" onclick="selectShift('Morning', this)">Morning</button>
        <button class="shift-btn" onclick="selectShift('Night', this)">Night</button>
        <button class="shift-btn" onclick="selectShift('OverNight', this)">O.Night</button>
      </div>
    </div>

    <!-- Flash ID + PC No. side by side -->
    <div class="field">
      <label><span class="dot"></span> Credentials</label>
      <div class="input-row">
        <div class="input-wrap">
          <input type="text" id="flashId"
                 placeholder="me216759@meti.ai"
                 autocomplete="off" autocorrect="off"
                 autocapitalize="none" spellcheck="false"
                 onkeydown="if(event.key==='Enter') document.getElementById('pcNo').focus()">
        </div>
        <div class="input-wrap">
          <input type="text" id="pcNo"
                 placeholder="PC No. (e.g. 123)"
                 autocomplete="off" autocorrect="off"
                 autocapitalize="none" spellcheck="false"
                 onkeydown="if(event.key==='Enter') submit()">
        </div>
      </div>
      <div class="hint">// flash id &nbsp;·&nbsp; device number assigned to you</div>

      <div class="safety-note">
        Each Flash ID must match its assigned device. One device per person per day.
      </div>
    </div>

    <button id="submitBtn" onclick="submit()">
      ▶ &nbsp; Record Attendance
    </button>

    <div class="spinner" id="spinner">
      <div class="spin-dots">
        <span></span><span></span><span></span>
      </div>
      Processing...
    </div>

  </div>

  <div class="result-card" id="result"></div>

  <div class="footer">METI · Attendance System v4.0</div>

</div>

<script>
  const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzRttM7jyk8bd4JsxPfljOhBSHTPdL2OaXB0HMC3CtZGQVQ7n91cKRDrgxCWeHWUkLx/exec";

  let selectedShift = "";

  function selectShift(shift, el) {
    selectedShift = shift;
    document.querySelectorAll(".shift-btn").forEach(b => b.classList.remove("active"));
    el.classList.add("active");
  }

  async function submit() {
    const flashId = document.getElementById("flashId").value.trim().toLowerCase();
    const pcNo    = document.getElementById("pcNo").value.trim();
    const result  = document.getElementById("result");
    const spinner = document.getElementById("spinner");
    const btn     = document.getElementById("submitBtn");

    result.style.display = "none";
    result.className = "result-card";

    if (!selectedShift)  { showError("Select a shift first."); return; }
    if (!flashId)        { showError("Flash ID cannot be empty."); return; }
    if (!pcNo)           { showError("PC number cannot be empty."); return; }

    btn.style.display     = "none";
    spinner.style.display = "flex";

    try {
      const res = await fetch(WEB_APP_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain" },
        body: JSON.stringify({ flashId, pcNo }),
      });

      const data = await res.json();

      spinner.style.display = "none";
      btn.style.display     = "block";

      if (data.success) {
        const d = data.data;
        result.className = "result-card success";
        result.innerHTML = `
          <div class="result-title">✓ &nbsp; Attendance Recorded</div>
          <div class="result-grid">
            <div class="result-row"><span class="rk">Name</span>     <span class="rv">${d.name}</span></div>
            <div class="result-row"><span class="rk">Flash ID</span> <span class="rv">${d.flashId}</span></div>
            <div class="result-row"><span class="rk">Shift</span>    <span class="rv">${d.shift}</span></div>
            <div class="result-row"><span class="rk">PC No.</span>   <span class="rv">${d.pcNo}</span></div>
            <div class="result-row"><span class="rk">Status</span>   <span class="rv"><span class="badge-p">${d.marked}</span></span></div>
          </div>
        `;
        result.style.display = "block";
        document.getElementById("flashId").value = "";
        document.getElementById("pcNo").value    = "";
        document.getElementById("flashId").focus();
      } else {
        showError(data.error || "Unknown error.");
      }

    } catch (err) {
      spinner.style.display = "none";
      btn.style.display     = "block";
      showError("Network error: " + err.message);
    }
  }

  function showError(msg) {
    const result = document.getElementById("result");
    result.className = "result-card error";
    result.innerHTML = `
      <div class="result-title">✕ &nbsp; Error</div>
      <div class="error-msg">${msg}</div>
    `;
    result.style.display = "block";
  }

  window.onload = () => document.getElementById("flashId").focus();
</script>
</body>
</html>
